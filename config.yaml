gemini:
  model: "gemini-flash-latest"
  media_resolution: "MEDIA_RESOLUTION_LOW"
  temperature: 0

quota:
  max_video_seconds_per_run: 12600  # ~3.5 video-hours, free-tier budget per run
  max_video_seconds_single: 7200    # 2h — longer videos are skipped, not analyzed

pages:
  base_url: "https://sdinev.github.io/trader-intelligence"

# Ticker aliases fold different symbols a creator might use for the SAME
# instrument into one canonical row. Matching is case-insensitive, so casing
# duplicates (e.g. "Gold" vs "GOLD") are already merged automatically — you only
# need entries here for genuine synonyms. Be careful NOT to merge different
# instruments (e.g. GLD the ETF vs GDX gold miners vs XAUUSD spot) — their price
# scales differ and a merged row would be nonsensical. Format: ALIAS: CANONICAL
ticker_aliases: {}
  # Example (uncomment / edit to taste):
  # XAUUSD: GOLD
  # XAGUSD: SILVER
